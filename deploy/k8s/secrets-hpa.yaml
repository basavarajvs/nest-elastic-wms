apiVersion: v1
kind: Secret
metadata:
  name: wms-secrets
  namespace: wms
type: Opaque
stringData:
  # Rotate these regularly — see JWT rotation strategy in docs
  DATABASE_URL: "postgresql://elasticwmsdbadmin:elasticwmsdbadmin@postgres:5432/elasticwms?schema=multitenant&pool_timeout=10&connection_limit=20"
  CORE_API_URL: "http://core-api:3000/api/v1"
  CORE_API_TOKEN: "changeme-minimum-32-chars-long-token-here"
  JWT_ACCESS_SECRET: "change-me-access-secret-min-32-chars"
  JWT_REFRESH_SECRET: "change-me-refresh-secret-min-32-chars"
  JWT_ACCESS_SECRET_OLD: ""
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_PASSWORD: ""
  OTLP_ENDPOINT: "http://otel-collector:4318/v1/traces"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wms-config
  namespace: wms
data:
  NODE_ENV: "production"
  API_PREFIX: "api/v1/wms"
  LOG_LEVEL: "info"
  PORT: "3001"
  DEPLOYMENT_MODE: "rolling"
  MIGRATION_LOCK_TIMEOUT_MS: "300000"
  PGBOUNCER_ENABLED: "false"
  DB_POOL_LIMIT: "20"
  SHUTDOWN_TIMEOUT_MS: "15000"
  HEAP_WARNING_THRESHOLD_MB: "1200"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: wms-app
  namespace: wms
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: wms-app
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
