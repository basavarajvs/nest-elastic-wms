# WMS Local Development — all dependencies
# Usage: docker compose up -d
# Then: pnpm start:dev

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: elasticwms
      POSTGRES_USER: elasticwmsdbadmin
      POSTGRES_PASSWORD: elasticwmsdbadmin
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elasticwmsdbadmin -d elasticwms"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:1.23
    environment:
      DB_USER: elasticwmsdbadmin
      DB_PASSWORD: elasticwmsdbadmin
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: elasticwms
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 100
      DEFAULT_POOL_SIZE: 10
      SERVER_RESET_QUERY: DISCARD ALL
    ports:
      - "6432:6432"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - pgbouncer

volumes:
  pgdata:
